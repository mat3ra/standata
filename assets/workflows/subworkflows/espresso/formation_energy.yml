# Runs QE SCF on compound material and computes formation energy (eV/atom).
#
# In:  MATERIAL, ELEMENTS, ELEMENT_MATERIALS
# Out: total_energy (property)     compound total energy (eV) from pw.x
#      E_MATERIAL                  compound total energy (eV) in global scope
#      ELEMENTAL_TE_HOLDER_BY_SYMBOL map symbol -> selected total_energy holder, highest precision
#      ELEMENTAL_TE_USED_BY_SYMBOL map symbol -> normalized elemental contribution row
#      E_ELEMENTAL_SUM             sum over compound atoms of (ref total_energy / ref atom count)
#      formation_energy (property) (E_MATERIAL - E_ELEMENTAL_SUM) / N_atoms, eV/atom
#      formation_energy_contributions (property) total energies used in the calculation
#      COMPOUND_PRECISION              precision from pw-scf kgrid context for compound row
application:
  name: espresso
  version: "6.3"
method:
  name: PseudopotentialMethod
model:
  name: DFTModel
name: Formation Energy
units:
  - config:
      execName: pw.x
      flavorName: pw_scf
      flowchartId: pw-scf
      name: pw_scf
    type: executionBuilder
  - type: assignment
    config:
      name: assign-e-material
      flowchartId: assign-e-material
      operand: E_MATERIAL
      value: total_energy
      input:
        - name: total_energy
          scope: pw-scf
  - type: io
    config:
      name: io-elemental-energies
      flowchartId: io-elemental-energies
      subtype: input
      source: api
      input:
        - type: api
          endpoint: refined-properties
          endpoint_options:
            params:
              query: >-
                {
                    "exabyteId": {"$in": [ELEMENT_MATERIALS[el].exabyteId for el in ELEMENTS]},
                    "slug": "total_energy",
                }
              projection: >-
                {
                    "sort": {"precision.value": -1},
                    "limit": min(500, max(20, len(ELEMENTS) * 10)),
                }
          name: DATA
  - type: assignment
    config:
      name: assign-elemental-te-holder-by-symbol
      flowchartId: assign-elemental-te-holder-by-symbol
      operand: ELEMENTAL_TE_HOLDER_BY_SYMBOL
      value: >-
        {
            el: (
                [
                    d
                    for d in DATA
                    if (
                        d.exabyteId == ELEMENT_MATERIALS[el].exabyteId
                        or ELEMENT_MATERIALS[el].exabyteId in d.exabyteId
                    )
                ]
                or [None]
            )[0]
            for el in ELEMENTS
        }
      input:
        - name: DATA
          scope: io-elemental-energies
  - type: assignment
    config:
      name: assign-missing-elemental-total-energy-symbols
      flowchartId: assign-missing-elemental-total-energy-symbols
      operand: MISSING_ELEMENTAL_TOTAL_ENERGY_SYMBOLS
      value: >-
        [el for el in ELEMENTS if ELEMENTAL_TE_HOLDER_BY_SYMBOL[el] is None]
  - type: assertion
    config:
      enableRender: true
      name: assert-elemental-total-energies-found
      flowchartId: assert-elemental-total-energies-found
      statement: "len(MISSING_ELEMENTAL_TOTAL_ENERGY_SYMBOLS) == 0"
      errorMessage: >-
        Missing total_energy for elemental reference material(s)
        {{ MISSING_ELEMENTAL_TOTAL_ENERGY_SYMBOLS | join(', ') }}.
        Run the QE Total Energy workflow for the corresponding Standata
        elemental material(s) before running Formation Energy.
  - type: assignment
    config:
      name: assign-elemental-te-used-by-symbol
      flowchartId: assign-elemental-te-used-by-symbol
      operand: ELEMENTAL_TE_USED_BY_SYMBOL
      value: >-
        {
            el: {
                "formula": el,
                "n_atoms": len(ELEMENT_MATERIALS[el].basis.elements),
                "is_elemental": True,
                "total_energy": ELEMENTAL_TE_HOLDER_BY_SYMBOL[el].data.value,
                "total_energy_per_atom": ELEMENTAL_TE_HOLDER_BY_SYMBOL[el].data.value
                / len(ELEMENT_MATERIALS[el].basis.elements),
                "precision_value": ELEMENTAL_TE_HOLDER_BY_SYMBOL[el].precision.value,
                "precision_metric": ELEMENTAL_TE_HOLDER_BY_SYMBOL[el].precision.metric,
            }
            for el in ELEMENTS
            if ELEMENTAL_TE_HOLDER_BY_SYMBOL[el]
        }
  - type: assignment
    config:
      name: assign-elemental-energy-sum
      flowchartId: assign-elemental-energy-sum
      operand: E_ELEMENTAL_SUM
      value: >-
        sum(
            ELEMENTAL_TE_USED_BY_SYMBOL[e["value"]]["total_energy_per_atom"]
            for e in MATERIAL.basis.elements
        )
  - type: assignment
    config:
      name: assign-formation-energy
      flowchartId: assign-formation-energy
      operand: FORMATION_ENERGY
      value: "(E_MATERIAL - E_ELEMENTAL_SUM) / len(MATERIAL.basis.elements)"
      results:
        - name: formation_energy
  - type: assignment
    config:
      name: assign-compound-precision
      flowchartId: assign-compound-precision
      operand: COMPOUND_PRECISION
      value: >-
        {
            "precision_value": context["kgrid"].get("gridMetricValue"),
            "precision_metric": context["kgrid"].get("gridMetricType"),
        }
      input:
        - name: context
          scope: pw-scf
  - type: assignment
    config:
      name: assign-formation-energy-compound-contribution
      flowchartId: assign-formation-energy-compound-contribution
      operand: FORMATION_ENERGY_COMPOUND_CONTRIBUTION
      value: >-
        {
            "formula": MATERIAL.formula,
            "n_atoms": len(MATERIAL.basis.elements),
            "is_elemental": False,
            "total_energy": E_MATERIAL,
            "total_energy_per_atom": E_MATERIAL / len(MATERIAL.basis.elements),
            "precision_value": COMPOUND_PRECISION["precision_value"],
            "precision_metric": COMPOUND_PRECISION["precision_metric"],
        }
  - type: assignment
    config:
      name: assign-formation-energy-contributions
      flowchartId: assign-formation-energy-contributions
      operand: FORMATION_ENERGY_CONTRIBUTIONS
      value: >-
        [FORMATION_ENERGY_COMPOUND_CONTRIBUTION] + [
            ELEMENTAL_TE_USED_BY_SYMBOL[el]
            for el in ELEMENTS
            if el in ELEMENTAL_TE_USED_BY_SYMBOL
        ]
      results:
        - name: formation_energy_contributions
