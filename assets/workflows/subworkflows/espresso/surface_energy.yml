application:
  name: espresso
  version: "6.3"
method:
  name: PseudopotentialMethod
model:
  name: DFTModel
name: Surface Energy - QE
units:
  - config:
      flowchartId: assign-surface-area
      name: assign-surface-area
      operand: A
      value: "np.linalg.norm(np.cross(SLAB.lattice.vectors.a, SLAB.lattice.vectors.b))"
    type: assignment
  - config:
      flowchartId: assign-n-bulk
      name: assign-n-bulk
      operand: N_BULK
      value: "len(BULK.basis.elements)"
    type: assignment
  - config:
      flowchartId: assign-n-slab
      name: assign-n-slab
      operand: N_SLAB
      value: "len(SLAB.basis.elements)"
    type: assignment
  - config:
      execName: pw.x
      flavorName: pw_scf
      flowchartId: pw-scf-surface-energy
      name: pw_scf
    type: executionBuilder
  - config:
      flowchartId: assign-e-slab
      input:
        - name: total_energy
          scope: pw-scf-surface-energy
      name: assign-e-slab
      operand: E_SLAB
      value: total_energy
    type: assignment
  - type: assignment
    config:
      flowchartId: assign-surface-energy
      name: assign-surface-energy
      operand: SURFACE_ENERGY
      results:
        - name: surface_energy
      value: "1 / (2 * A) * (E_SLAB - E_BULK * (N_SLAB / N_BULK))"
