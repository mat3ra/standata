name: Phonon Map
units:
  - name: pw_scf
    type: subworkflow
    config:
      attributes:
        name: Preliminary SCF Calculation
  - name: ph_init_qpoints
    type: subworkflow
  - name: espresso_xml_get_qpt_irr
    type: subworkflow
  - name: phonon_map_workflow
    type: workflow
    config:
      functions:
        setDefaultCompute: null
      input:
        name: Q_POINTS
      mapUnit: true
    units:
      - name: pre_processor
        type: subworkflow
      - name: ph_single_irr_qpt
        type: subworkflow
      - name: post_processor
        type: subworkflow
  - name: phonon_reduce
    type: subworkflow
